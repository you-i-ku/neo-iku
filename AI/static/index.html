<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>イク — neo-iku</title>
    <link rel="stylesheet" href="/static/style.css?v=40">
</head>
<body>
    <!-- ステータスバー -->
    <div class="status-bar">
        <span id="connection-status" class="status-dot offline"></span>
        <span id="status-llm" class="status-bar-item">LLM: —</span>
        <span class="status-bar-sep">|</span>
        <span id="status-memories" class="status-bar-item">記憶: —</span>
        <span class="status-bar-sep">|</span>
        <span id="status-countdown" class="status-bar-item countdown">次の自律: —</span>
        <span class="status-bar-sep">|</span>
        <span id="status-energy" class="status-bar-item energy" title="内発的動機エネルギー">⚡ 0</span>
        <span class="status-bar-sep">|</span>
        <span id="status-mode" class="status-bar-item">モード: —</span>
        <div class="status-bar-right">
            <button id="mode-btn" class="mode-btn normal" title="クリックでモード切替">ノーマル</button>
        </div>
    </div>

    <!-- タブバー -->
    <div class="tab-bar">
        <button class="tab-btn active" data-tab="chat">チャット</button>
        <button class="tab-btn" data-tab="dev">開発者</button>
        <button class="tab-btn" data-tab="log">ログ</button>
        <button class="tab-btn" data-tab="report">自律度</button>
    </div>

    <!-- チャットタブ -->
    <div id="tab-chat" class="tab-content active">
        <div id="chat-messages" class="messages"></div>
        <div class="input-area">
            <textarea id="chat-input" placeholder="メッセージを入力..." rows="2"></textarea>
            <button id="send-btn">送信</button>
            <button id="stop-btn" disabled title="出力を停止">⏹</button>
        </div>
    </div>

    <!-- 開発者タブ -->
    <div id="tab-dev" class="tab-content">
        <div class="dev-layout">
            <!-- 左: 思考ログ -->
            <div class="dev-left">
                <div class="dev-section-header">思考ログ</div>
                <div id="thought-log" class="thought-log">
                    <div class="thought-log-empty">AIの思考過程がここに表示されます</div>
                </div>
            </div>
            <!-- 右: 設定・ステータス・記憶 -->
            <div class="dev-right">
                <div class="dev-right-scroll">
                    <!-- 設定 -->
                    <div class="section">
                        <h3>設定</h3>
                        <div class="dev-tools-grid">
                            <div class="dev-item">
                                <label>モデル</label>
                                <select id="model-select" class="model-select">
                                    <option value="">読み込み中...</option>
                                </select>
                            </div>
                            <div class="dev-item">
                                <label>自律行動間隔（秒）</label>
                                <div class="dev-row">
                                    <input id="dev-interval" type="number" min="10" value="300">
                                    <button id="dev-interval-btn">設定</button>
                                </div>
                            </div>
                            <div class="dev-item">
                                <label class="dev-toggle-label">
                                    <input id="dev-concurrent" type="checkbox">
                                    <span>会話中の自律行動</span>
                                </label>
                            </div>
                            <button id="dev-trigger-btn" class="dev-btn trigger">今すぐ自律行動</button>
                            <button id="dev-reset-btn" class="dev-btn danger">DBリセット（過去ログ以外）</button>
                            <button id="dev-clear-selfmodel-btn" class="dev-btn danger">自己モデルクリア</button>
                            <button id="dev-vector-reindex-btn" class="dev-btn">ベクトル再構築</button>
                        </div>
                    </div>

                    <!-- 自己モデル -->
                    <div class="section">
                        <h3>自己モデル <button id="selfmodel-refresh-btn" class="dev-btn-sm" title="更新">↻</button></h3>
                        <pre id="selfmodel-display" class="selfmodel-display">読み込み中...</pre>
                    </div>

                    <!-- 記憶検索 -->
                    <div class="section">
                        <h3>記憶</h3>
                        <div class="search-area">
                            <input id="memory-search" type="text" placeholder="記憶を検索...">
                            <button id="search-btn">検索</button>
                        </div>
                        <div id="memory-list" class="memory-list"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ログタブ -->
    <div id="tab-log" class="tab-content">
        <div class="log-tab-header">
            <div class="log-filters">
                <button class="log-filter-btn active" data-level="ALL">ALL</button>
                <button class="log-filter-btn" data-level="DEBUG">DEBUG</button>
                <button class="log-filter-btn" data-level="INFO">INFO</button>
                <button class="log-filter-btn" data-level="WARNING">WARNING</button>
                <button class="log-filter-btn" data-level="ERROR">ERROR</button>
            </div>
            <button id="log-clear-btn" class="log-clear-btn">クリア</button>
        </div>
        <div id="log-content" class="log-content-full"></div>
    </div>

    <!-- 自律度レポートタブ -->
    <div id="tab-report" class="tab-content">
        <div class="report-header">
            <div class="report-period">
                <label>期間: <input id="report-from" type="date" value="2020-01-01"></label>
                <span>〜</span>
                <label><input id="report-to" type="date" value="2030-01-01"></label>
                <button id="report-load-btn" class="report-load-btn">集計</button>
            </div>
        </div>
        <div id="report-content" class="report-content">
            <div class="report-empty">「集計」を押すとレポートが表示されます</div>
        </div>

        <!-- 蒸留ログ -->
        <details class="distillation-section">
            <summary class="distillation-summary">
                蒸留ログ
                <button id="distillation-load-btn" class="report-load-btn">読み込む</button>
            </summary>
            <div id="distillation-content" class="distillation-content">
                <div class="report-empty">「読み込む」を押すと蒸留ログが表示されます</div>
            </div>
        </details>

        <!-- Ablation実験 -->
        <details class="distillation-section">
            <summary class="distillation-summary">Ablation実験</summary>
            <div class="ablation-controls">
                <p class="ablation-desc">各サブシステムのON/OFFを切り替えて比較実験を行う。OFFにすると該当機能が無効化される。</p>
                <div class="ablation-grid">
                    <label class="ablation-toggle">
                        <input id="abl-energy" type="checkbox" checked>
                        <span class="ablation-name">エネルギーシステム</span>
                        <span class="ablation-detail">OFF: 固定インターバルで発火（蓄積/閾値/消費を無効化）</span>
                    </label>
                    <label class="ablation-toggle">
                        <input id="abl-self-model" type="checkbox" checked>
                        <span class="ablation-name">自己モデル</span>
                        <span class="ablation-detail">OFF: read/update_self_modelが常に空を返す</span>
                    </label>
                    <label class="ablation-toggle">
                        <input id="abl-prediction" type="checkbox" checked>
                        <span class="ablation-name">予測-検証</span>
                        <span class="ablation-detail">OFF: expect=引数を無視（予測誤差ループ無効）</span>
                    </label>
                    <label class="ablation-toggle">
                        <input id="abl-distillation" type="checkbox" checked>
                        <span class="ablation-name">蒸留</span>
                        <span class="ablation-detail">OFF: 振り返り・原則蒸留を無効化</span>
                    </label>
                </div>
            </div>
        </details>
    </div>

    <script src="/static/app.js?v=41"></script>
</body>
</html>
